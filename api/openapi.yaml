          application/json:
            schema:
              type: string
        description: Celeb PlatformIdentity ID
        required: true
        x-originalParamName: celeb_id
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.StanResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Bad Request
        "404":
