  /v2/identities:
    post:
      description: |-
        The platform mints the piid (ADR 0033). Supply an optional
        Idempotency-Key header for best-effort retry dedup: while the
        replay record lives (~24h) the same key replays the original
        201. Replays are keyed only by the header — the request body is
        not compared (ADR 0034). Profile mutations land via PUT, never
        via repeat POST. metadata is opaque and echoed verbatim.
      operationId: createIdentities
      parameters:
      - description: Best-effort retry key (~24h). Replays are keyed only by this
          header and return the original response body.
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          type: string
        style: simple
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Handler.createPlatformIdentityRequest'
        description: Platform identity payload
        required: true
        x-originalParamName: identity
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.PlatformIdentityResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: Register a platform identity (platform mints the id)
      tags:
      - Identities
  /v2/identities/{id}:
    delete:
      description: |-
        404 covers "genuinely missing", "already soft-deleted", and
        "exists under a different tenant" — callers cannot distinguish
        (ADR 0006: no existence leak; ADR 0020: 404-on-deleted is
        idempotent). Soft delete only — hard-delete + PII wipe is
        future work. Companion to Branda's POST /members/delete.
      operationId: deleteIdentitiesById
      parameters:
      - description: Platform Identity ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: "Soft-delete a platform identity, scoped to the calling tenant"
      tags:
      - Identities
    get:
      description: |-
        Returns 404 (not 403) when the row exists under a different
        tenant — no existence leak across tenants. ADR 0006.
      operationId: getIdentitiesById
      parameters:
      - description: Platform Identity ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.PlatformIdentityResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: "Get a platform identity by ID, scoped to the calling tenant"
      tags:
      - Identities
    put:
      description: |-
        Text fields are overwritten as-sent (omission blanks them); image
        URLs are skipped when empty so a partial body doesn't accidentally
        clear them. PUT is the only mutation path on existing PIs —
        POST never mutates an existing identity. ADR 0006.
      operationId: updateIdentitiesById
      parameters:
      - description: Platform Identity ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Handler.updatePlatformIdentityRequest'
        description: Profile fields
        required: true
        x-originalParamName: profile
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.PlatformIdentityResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: "Replace a platform identity's profile, scoped to the calling tenant"
      tags:
      - Identities
