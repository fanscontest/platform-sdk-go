  /v2/blocks:
    get:
      description: Get Blocked Members
      operationId: getBlocks
      parameters:
      - description: Opaque pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: "Page size (default 50, max 200)"
        explode: true
        in: query
        name: limit
        required: false
        schema:
          type: integer
        style: form
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.BlockListResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: Get Blocked Members (cursor-paginated)
      tags:
      - Blocks
    post:
      description: |-
        Idempotent block create. A repeat POST for the same
        (blocker, blocked) pair returns 200 with the existing row
        regardless of channel scope; side effects (unsubscribe +
        open-enrollment withdrawal) fire only on the first-time
        insert. To widen a channel-scoped block to global, DELETE
        first and re-POST. See uman#94 / ADR 0023 + ADR 0025.
      operationId: createBlocks
      parameters:
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Handler.createBlockRequest'
        description: Block payload; optional channel_id scopes the block to a channel
        required: true
        x-originalParamName: request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.BlockResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: Create Block
      tags:
      - Blocks
