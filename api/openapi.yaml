    post:
      description: |-
        Idempotent stan create. POSTing the same (caller, celeb) pair
        twice returns 200 with the existing row both times; side
        effects (channel subscriptions + new-stan notification) fire
        only on the first call. See uman#94 / ADR 0023.
      operationId: createCelebs
      parameters:
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
