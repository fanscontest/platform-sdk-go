        Bounded set sorted by name (not a keyset list); per uman#132 it
        carries an inert pagination block (has_next:false) and ignores
        cursor/limit.
      operationId: getChannelsByIdTeamSets
      parameters:
      - description: Channel ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: "Accepted for shape uniformity; ignored (single-page, name-sorted)"
        explode: true
        in: query
        name: cursor
