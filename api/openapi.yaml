paths:
  /v2/admin/hosting-invitations:
    get:
      operationId: getAdminHostingInvitations
      parameters:
      - description: Opaque pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: "Page size (default 50, max 200)"
        explode: true
        in: query
        name: limit
        required: false
        schema:
          type: integer
        style: form
      - description: Acting-as. The platform identity id (piid) this request is on
          behalf of. The platform verifies the piid belongs to the calling tenant
          and acts as that identity. Omit for tenant-level calls.
        explode: false
        in: header
        name: X-Acting-As
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain.ContestHostingListResponse'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Handler.ErrorResponse'
          description: Internal Server Error
      summary: List pending hosting invitations for the calling tenant's venues
      tags:
      - Contests
